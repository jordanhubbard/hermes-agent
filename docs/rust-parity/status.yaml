          - cli.py
          - gateway/run.py
          - gateway/session.py
          - gateway/mirror.py
          - gateway/platforms/api_server.py
          - hermes_cli/main.py
          - hermes_cli/web_server.py
          - hermes_cli/goals.py
          - tui_gateway/server.py
          - acp_adapter/session.py
          - mcp_serve.py
          - cron/scheduler.py
          - plugins/hermes-achievements/dashboard/plugin_api.py
        rust_target: hermes_state_factory.get_session_db
        status: tested
        ci_gate: tests/parity/state/test_factory.py
        notes: Factory landed; all production SessionDB() callsites migrated. Static-method imports (SessionDB.sanitize_title) intentionally left in place.
      - bead: hermes-te4.2
        story: Add supported Rust state backend selection and diagnostics
        python_paths:
          - hermes_state_factory.py
        rust_target: HERMES_STATE_BACKEND env + state.backend config key
        status: tested
        ci_gate: tests/parity/state/test_factory.py
        notes: Selection order arg → env → config → default(python). Explicit (arg/env) Rust failures raise; config-driven failures fall back to Python with a logged warning. state_backend_diagnostics() reports backend, source, fallback_reason, and (with db arg) merges adapter diagnostics.
      - bead: hermes-te4.3
        story: Exercise Rust state backend in real production entry points
        python_paths:
          - cli.py
          - gateway/run.py
          - hermes_cli/web_server.py
        rust_target: tests/parity/state/test_e2e_factory_daemon.py
        status: tested
        ci_gate: tests/parity/state/test_e2e_factory_daemon.py
        notes: e2e test drives env -> factory -> RustSessionDB(daemon) -> daemon binary -> SQLite through a realistic session lifecycle (create, append user/assistant/tool/reasoning messages, update tokens, FTS search, rich list, end, delete) — the same call shapes cli.py, gateway/run.py, hermes_cli/web_server.py use. Subprocess-invocation smoke for the literal hermes CLI binary is a follow-up; the underlying behavior is already gated.
      - bead: hermes-te4.4
        story: Make Rust state parity mandatory in CI
        python_paths:
          - .github/workflows/tests.yml
        rust_target: required CI job
        status: planned
        ci_gate: GitHub Actions required check
        notes: Once green for two weeks, parity job becomes required.

# Subsystems that exist in Rust but are not yet on the cutover ladder.
# These are descriptive-only and not bead-tracked.
existing_rust:
  - path: crates/hermes-state
    description: SQLite-backed state store with schema, search, title resolver, and a CLI probe.
    state: tested-via-subprocess
    notes: Exercised through hermes_state_rust.RustSessionDB; not production-wired.
