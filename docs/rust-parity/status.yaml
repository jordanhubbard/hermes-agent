  - id: hermes-izz
    name: Production-grade state backend runtime
    summary: Replace the cargo-subprocess probe with a real production boundary.
    rows:
      - bead: hermes-izz.1
        story: Replace subprocess probe with a production Rust boundary
        python_paths:
          - hermes_state_rust.py
        rust_target: crates/hermes-state/src/bin/hermes_state_daemon.rs
        status: tested
        ci_gate: cargo test -p hermes-state --test daemon + tests/parity/state/test_daemon_mode.py
        notes: Standalone daemon binary listening on a Unix socket using length-prefixed JSON. Op handling is shared with the probe via crates/hermes-state/src/ops.rs so they cannot drift. RustSessionDB(boundary="daemon") autospawns the daemon, connects, and routes ops over the socket; HERMES_STATE_BOUNDARY env var honored. Subprocess boundary remains the default for back-compat. Idle daemon shuts down after 5 min by default.
      - bead: hermes-izz.2
        story: Match SessionDB write contention and WAL behavior
        python_paths:
          - hermes_state.py
        rust_target: crates/hermes-state/src/bin/hermes_state_daemon.rs (Mutex<SessionStore>)
        status: tested
        ci_gate: tests/parity/state/test_daemon_concurrency.py + crates/hermes-state/tests/daemon.rs
        notes: Daemon handles connections concurrently (thread-per-connection with a shared Mutex<SessionStore>) so a long-lived client never blocks others. SQLite remains single-writer through the mutex, which sidesteps the multi-process WAL retry-with-jitter loop the Python SessionDB needs. 8 concurrent writers x 10 ops each round-trip without data loss; per-thread FIFO ordering preserved; bad ops from one client do not taint others.
      - bead: hermes-izz.3
        story: State backend observability and rollback diagnostics
        python_paths:
          - hermes_state_rust.py
          - hermes_state_factory.py
        rust_target: crates/hermes-state
        status: tested
        ci_gate: tests/parity/state/test_diagnostics.py
        notes: RustSessionDB.diagnostics() exposes backend, boundary, db_path, schema_version, migration_action, op_count, error_count, last_error, and last_error_class. Initialization logs db path, schema version, and migration action. rollback_diagnostics() opens the same DB through Python SessionDB and reports python_readable, schema_version, session_count, and any error class. Factory logs selected backend with db_path and merges adapter snapshots via state_backend_diagnostics(db).
      - bead: hermes-izz.4
        story: Benchmark Rust state store against Python baseline
        python_paths:
          - hermes_state.py
          - scripts/bench_state.py
        rust_target: scripts/bench_state.py (drives Python + Rust subprocess + Rust daemon)
        status: tested
        ci_gate: tests/parity/state/test_bench_harness.py
        notes: Headline numbers (M2 Pro, 30 create+append pairs per backend) — Python 0.29 ms/op (3471 ops/s) baseline, subprocess 270.30 ms/op (3.7 ops/s, 941x slower than Python — unviable), daemon 0.36 ms/op (2745 ops/s, 1.26x slower than Python — acceptable for the IPC cost). Validates the cutover argument that the daemon brings Rust within reasonable distance of Python while subprocess is a non-starter.

