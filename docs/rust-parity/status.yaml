        rust_target: crates/hermes-gateway
        status: tested
        ci_gate: cargo test -p hermes-gateway + tests/parity/gateway/test_slash.py
        notes: Rust gateway command router now uses the Rust CLI registry for canonical names and gateway-known filtering, matches Python's active-session bypass rule for every resolvable slash command, and classifies representative control flows including approve/deny, yolo, reload-mcp, reload-skills, title/resume, background/bg, queue, steer, status, help, and unsupported CLI-only commands.
      - bead: hermes-4ne.3
