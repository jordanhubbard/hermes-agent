# Rust parity status — source of truth for docs/rust-parity/README.md.
#
# Update this file when a bead changes state, then run:
#   python scripts/rust_parity_status.py --write
# to regenerate docs/rust-parity/README.md.
#
# Status ladder (each step is a strict superset of the prior):
#   planned          — work has not started
#   in_progress      — design or scaffolding exists, not behavior-complete
#   ported           — Rust implementation exists with feature parity
#   tested           — parity tests run Rust vs Python on the same inputs
#   production_wired — at least one production entry point uses the Rust path
#   default          — Rust is the default in CI and shipped builds
#   deferred         — explicitly not being ported (must include reason)

statuses:
  - planned
  - in_progress
  - ported
  - tested
  - production_wired
  - default
  - deferred

constraints:
  - title: Rust crates do not link to in-repo Python
    body: >
      Every Rust crate in this repo is a standalone reimplementation. It
      must not import or link in-repo Python code, must not be built as a
      Python extension whose sole purpose is to be loaded by CPython
      (e.g. PyO3 wheels), and must not embed CPython. Where a Python
      module in this repo wraps a third-party library, the Rust side
      reaches that library directly via a Rust crate (or its native
      interface) — never by calling back into the Python wrapper.
      This rule applies to every row in the matrix below.

epics:
  - id: hermes-1oa
    name: Agent core runtime
    summary: Port AIAgent and the synchronous conversation/tool-call loop to Rust.
    rows:
      - bead: hermes-1oa.1
        story: Define Rust agent-core domain model
        python_paths:
          - run_agent.py
          - agent/model_metadata.py
          - agent/credential_pool.py
          - agent/context_compressor.py
          - hermes_cli/runtime_provider.py
        rust_target: crates/hermes-agent-core
        status: tested
        ci_gate: cargo test -p hermes-agent-core (rust CI job)
        notes: All acceptance categories present. Modules - message, tool, budget, compression, provider, outcome. Types - Role, Message, AssistantTurn, ToolTurn, ToolCall, ToolResult, ToolDefinition, ToolFunction, TokenUsage, TurnCost, ConversationBudget, CompressionEvent, CompressionTrigger, LineageTip, ApiMode, ProviderRouting, InterruptKind, ConversationOutcome, ConversationResult. 28 cargo tests cover serde round-trip and shape contracts (assistant null content preserved, default omits empty fields, externally-tagged outcome variants, saturating add on token usage, budget exhaustion semantics).
      - bead: hermes-1oa.2
        story: Port the AIAgent conversation loop
        python_paths:
          - run_agent.py
        rust_target: crates/hermes-agent-core (planned)
        status: planned
        ci_gate: tests/parity/agent_core/test_loop.py
        notes: Synchronous tool-call iteration and budget accounting.
      - bead: hermes-1oa.3
        story: Port compression and resume boundary behavior
        python_paths:
          - agent/context_compressor.py
          - run_agent.py
          - hermes_state.py
        rust_target: crates/hermes-agent-core (planned)
        status: planned
        ci_gate: tests/parity/agent_core/test_compression.py
        notes: Head/tail preservation, summary fallback, lineage on split.
      - bead: hermes-1oa.4
        story: Port provider-specific request and response handling
        python_paths:
          - run_agent.py
          - agent/auxiliary_client.py
          - hermes_cli/runtime_provider.py
        rust_target: crates/hermes-agent-core (planned)
